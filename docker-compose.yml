version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_city_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=0364d27c652425fa5de18621030caa0aa4f295ed9ef65d43ef265cb7e827ec83
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./smart_city.db}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app          # Hot-reload in development
      - db_data:/app/data       # Persist SQLite database
    networks:
      - smart_city_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_city_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://backend:8000/api
      - VITE_WS_URL=ws://backend:8000/ws/dashboard
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smart_city_net

  # ── PostgreSQL (Production) ───────────────────────────────────
