  #     POSTGRES_DB: smart_city_db
  #     POSTGRES_USER: ${POSTGRES_USER:-cityuser}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citypass123}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - smart_city_net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cityuser}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  
volumes:
  db_data:
  # postgres_data:

networks:
  smart_city_net:
    driver: bridge